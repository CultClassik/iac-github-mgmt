name: Terraform Module Build
on: [push, pull_request]
# defaults:
#   run:
#     working-directory: /
env:
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  TF_VERSION: "~1.0"
jobs:
  # tflint:
  terrascan:
    runs-on: ubuntu-latest
    name: Terrascan
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      # https://github.com/marketplace/actions/terrascan-iac-scanner
    - name: Run Terrascan
      id: terrascan
      uses: accurics/terrascan-action@main
      with:
        iac_type: 'terraform'
        iac_version: 'v14'
        policy_type: 'azure'
        only_warn: true
        verbose: true 
        sarif_upload: true
        #non_recursive:
        iac_dir: /
        #policy_path:
        #skip_rules:
        #config_path:
        #find_vulnerabilities:
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v1
      with:
        sarif_file: terrascan.sarif

  terraform_plan:
    runs-on: ubuntu-latest
    name: Terraform Plan
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
    - uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: ${{ env.TF_VERSION }}
        cli_config_credentials_token: ${{ env.TF_API_TOKEN }}
    - name: Terrform Init
      id: tf_init
      run: terraform init
    # - uses: cschleiden/replace-tokens@v1
    #   with:
    #     tokenPrefix: '$('
    #     tokenSuffix: ')'
    #     files: '["**/*.template"]'
    # - name: Rename vars file
    #   run: mv terraform.auto.tfvars.template terraform.auto.tfvars
    - name: Terraform Plan
      id: plan
      run: terraform plan -no-color -var 'tfe_token=${{ secrets.TF_API_TOKEN }}'
    - run: echo ${{ steps.plan.outputs.stdout }}
    - run: echo ${{ steps.plan.outputs.stderr }}
    - run: echo ${{ steps.plan.outputs.exitcode }}

  # tag_repo: