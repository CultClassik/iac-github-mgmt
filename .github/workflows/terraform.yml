name: Terraform Configuration Run
on:
  push:
    branches: 
      - '**'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:
# defaults:
#   run:
#     working-directory: /
env:
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  TF_VERSION: "~1.0"
jobs:
  # tflint:
  terrascan:
    runs-on: ubuntu-latest
    name: Terrascan
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      # https://github.com/marketplace/actions/terrascan-iac-scanner
    - name: Run Terrascan
      id: terrascan
      uses: accurics/terrascan-action@main
      with:
        iac_type: 'terraform'
        iac_version: 'v14'
        policy_type: 'azure'
        only_warn: true
        verbose: true 
        sarif_upload: true
        #non_recursive:
        iac_dir: /
        #policy_path:
        #skip_rules:
        #config_path:
        #find_vulnerabilities:
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v1
      with:
        sarif_file: terrascan.sarif

  terraform_run:
    runs-on: ubuntu-latest
    name: Terraform Run
    steps:
    - uses: actions/checkout@v2
    - uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: ${{ env.TF_VERSION }}
        cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }} # only used for this workspace

    - name: Terrform Init
      id: tf_init
      run: terraform init
    # - uses: cschleiden/replace-tokens@v1
    #   with:
    #     tokenPrefix: '$('
    #     tokenSuffix: ')'
    #     files: '["**/*.template"]'
    # - name: Rename vars file
    #   run: mv terraform.auto.tfvars.template terraform.auto.tfvars
    - name: Terraform Plan
      id: plan
      run: terraform plan -no-color
    # # - run: echo ${{ steps.plan.outputs.stdout }}
    # # - run: echo ${{ steps.plan.outputs.stderr }}
    # # - run: echo ${{ steps.plan.outputs.exitcode }}

    - uses: actions/github-script@0.9.0
      if: github.event_name == 'pull_request'
      env:
        PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
          #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
          #### Terraform Validation 🤖\`${{ steps.validate.outputs.stdout }}\`
          #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
          
          <details><summary>Show Plan</summary>
          
          \`\`\`\n
          ${process.env.PLAN}
          \`\`\`
          
          </details>
          
          *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Working Directory: \`${{ env.tf_actions_working_dir }}\`, Workflow: \`${{ github.workflow }}\`*`;
            
          github.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

    - name: Terraform Apply
      id: apply
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve